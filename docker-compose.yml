services:
  epaper-dashboard:
    build: .
    container_name: epaper-dashboard
    restart: unless-stopped
    environment:
      EPAPER_CONFIG: /config/config.yaml
      NEXTCLOUD_USERNAME: ${NEXTCLOUD_USERNAME:-}
      NEXTCLOUD_APP_PASSWORD: ${NEXTCLOUD_APP_PASSWORD:-}
    volumes:
      - ./config:/config:ro
      - ./data:/data
