ap:
  base_url: "http://192.168.1.50"

tags:
  - name: "hallway"
    mac: "0000000000000000"
    width: 800
    height: 480
    color: "bwy"
    dither: false
    # OpenEPaperLink LUT mode. Common AP/UI choices are:
    # default, no-repeat, fast-no-reds, fast
    # Leave empty to let the AP/tag default decide.
    lut: ""
    refresh_seconds: 900
    dashboard: "overview"
  # - name: "transport"
  #   mac: "1111111111111111"
  #   width: 800
  #   height: 480
  #   color: "bwy"
  #   dither: false
  #   lut: ""
  #   refresh_seconds: 300
  #   dashboard: "transportation"

efficiency:
  # When true, uploads are triggered only by dashboard content changes.
  # Clock and battery rendering are intentionally ignored for this decision.
  upload_only_on_content_change: true

dashboards:
  overview:
    title: "Today"
    timezone: "Europe/Berlin"
    rendering:
      show_battery: true
    sections:
      calendar:
        enabled: true
        max_items: 5
      tasks:
        enabled: true
        max_items: 5
      transit:
        enabled: true
        max_items: 5
      news:
        enabled: true
        max_items: 4
  transportation:
    title: "Transit"
    timezone: "Europe/Berlin"
    # The layout is inferred for a dashboard named "transportation",
    # but keeping it explicit makes the intent obvious.
    layout: "transportation"
    rendering:
      show_battery: true
    sections:
      transit:
        enabled: true
        max_items: 12
        # Directions can live here for dashboard-specific transport pages.
        # They can also live under sources.transit.directions as global defaults.
        directions:
          - name: "FfM Hbf -> Darmstadt Hbf"
            mode: "trip"
            src_station_id: ""
            src_label: "FfM Hbf"
            dst_station_id: ""
            dst_label: "Darmstadt Hbf"
            max_items: 2
            excluded_products: ["ICE", "IC", "EC"]
          - name: "FfM Hbf -> Offenbach Marktplatz"
            mode: "trip"
            src_station_id: ""
            src_label: "FfM Hbf"
            dst_station_id: ""
            dst_label: "Offenbach Marktplatz"
            max_items: 2
            excluded_products: ["ICE", "IC", "EC"]
          - name: "Willy-Brandt-Platz -> Suedbahnhof"
            mode: "trip"
            src_station_id: ""
            src_label: "FfM Willy-Brandt-Platz"
            dst_station_id: ""
            dst_label: "FfM Suedbahnhof"
            max_items: 2
            excluded_products: ["ICE", "IC", "EC"]
      # Alias for simple transport-only dashboards. This enables the
      # transportation layout, while the actual route definitions may live
      # under sources.directions.
      directions:
        enabled: false
        max_items: 10

sources:
  caldav:
    enabled: false
    url: "https://nextcloud.example.com/remote.php/dav"
    username: "${NEXTCLOUD_USERNAME}"
    password: "${NEXTCLOUD_APP_PASSWORD}"
    days_ahead: 14
    discover: true
    calendar_urls: []
    task_urls: []
  transit:
    enabled: false
    provider: "rmv_hapi"
    base_url: "https://www.rmv.de/hapi"
    access_id: "${RMV_ACCESS_ID}"
    # departure_board: all or filtered departures from one station
    # trip: journeys from src_station_id to dst_station_id
    mode: "departure_board"
    src_station_id: ""
    dst_station_id: ""
    # Optional RMV direction station ID for departure_board mode.
    direction: ""
    # If false, departure_board mode requires either direction,
    # destination_names, lines, or included_products to avoid a broad board.
    all_departures: true
    duration_minutes: 60
    max_journeys: 10
    timeout_seconds: 20
    language: "de"
    realtime: true
    # Optional local post-filters. Product names match RMV output such as:
    # ICE, IC, EC, RE, RB, S, U-Bahn, Tram, Bus
    included_products: []
    excluded_products:
      - "ICE"
      - "IC"
      - "EC"
    lines: []
    destination_names: []
    # Optional global directions. Prefer dashboard sections for per-dashboard
    # transport pages.
    directions: []
  # Compatibility alias for transport-only setups. If present, this is used
  # as sources.transit.directions.
  directions: []
  rss:
    enabled: false
    timeout_seconds: 20
    urls:
      - url: "https://example.com/feed.xml"
        source: "Example"
