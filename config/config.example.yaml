ap:
  base_url: "http://192.168.1.50"

tags:
  - name: "hallway"
    mac: "0000000000000000"
    width: 800
    height: 480
    color: "bwy"
    dither: false
    refresh_seconds: 900
    dashboard: "overview"

dashboards:
  overview:
    title: "Today"
    timezone: "Europe/Berlin"
    sections:
      calendar:
        enabled: true
        max_items: 5
      tasks:
        enabled: true
        max_items: 5
      transit:
        enabled: true
        max_items: 5
      news:
        enabled: true
        max_items: 4

sources:
  caldav:
    enabled: false
    url: "https://nextcloud.example.com/remote.php/dav"
    username: "${NEXTCLOUD_USERNAME}"
    password: "${NEXTCLOUD_APP_PASSWORD}"
    days_ahead: 14
    discover: true
    calendar_urls: []
    task_urls: []
  transit:
    enabled: false
    provider: "db_transport_rest"
    base_url: "https://v6.db.transport.rest"
    station_id: ""
    direction: ""
    duration_minutes: 60
    timeout_seconds: 20
    language: "de"
    profile: "dbnav"
    products:
      nationalExpress: true
      national: true
      regionalExpress: true
      regional: true
      suburban: true
      bus: true
      ferry: true
      subway: true
      tram: true
      taxi: true
  rss:
    enabled: false
    timeout_seconds: 20
    urls:
      - url: "https://example.com/feed.xml"
        source: "Example"
